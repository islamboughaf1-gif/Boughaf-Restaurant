<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boughaf Restaurant | Commande</title>

  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>

<body>

<header class="navbar">
  <h1>Boughaf Restaurant</h1>

  <div class="cart-btn">
    🛒 <span id="cart-count">0</span>
  </div>
</header>

<!-- MENU -->
<section class="menu">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1606755962773-d324e0a13086">
    <h3>Poulet Grillé</h3>
    <p>50 MAD</p>
    <button onclick="addToCart('Poulet Grillé', 50)">Ajouter</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1548365328-9f547f6f8b2a">
    <h3>Pizza Royale</h3>
    <p>70 MAD</p>
    <button onclick="addToCart('Pizza Royale', 70)">Ajouter</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1601924582970-9238bcb495d9">
    <h3>Tacos XL</h3>
    <p>60 MAD</p>
    <button onclick="addToCart('Tacos XL', 60)">Ajouter</button>
  </div>

</section>

<!-- CART -->
<section class="cart">
  <h2>🛒 Panier</h2>

  <div id="cart-items"></div>

  <h3>Total: <span id="total">0</span> MAD</h3>

  <button class="order-btn" onclick="checkout()">
    Commander maintenant
  </button>
</section>

</body>
</html>
